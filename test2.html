<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test</title>
</head>
<body style="background:#222;color:#fff;padding:30px;font-family:sans-serif">
<h2>Test archivo</h2>
<p>Pulsa el botón y selecciona cualquier archivo:</p>
<br>
<input type="file" style="font-size:20px;padding:10px;width:100%">
<br><br>
<input type="file" accept="image/*" style="font-size:20px;padding:10px;width:100%">
<br><br>
<input type="file" accept="application/pdf" style="font-size:20px;padding:10px;width:100%">
<br><br>
<div id="result" style="margin-top:20px;font-size:16px;color:#0f0"></div>
<script>
document.querySelectorAll('input[type=file]').forEach(function(inp){
  inp.addEventListener('change', function(){
    document.getElementById('result').textContent = 'FUNCIONÓ: ' + (this.files[0] ? this.files[0].name : 'sin archivo');
  });
});
</script>
</body>
</html>
